# Site Settings
name: LearnAI
title: LearnAI | AI-powered learning blog
version: v1.0.0
description: LearnAI is an AI-powered learning blog for developers, featuring structured series and hands-on tutorials.

# Organization Schema (for E-E-A-T and site-level authority)
organization:
  name: LearnAI
  url: https://srisatyalokesh.is-a.dev
  logo: https://srisatyalokesh.is-a.dev/assets/img/logo.png
  sameAs:
    - https://github.com/SriSatyaLokesh
    - https://linkedin.com/in/SriSatyaLokesh
  contact_point:
    contact_type: Customer Support
    email: srisatyalokesh2.12@gmail.com

tags:
  - blog
  - learning
  - ai
  - jekyll
  - devtools
show_hero: true
menu:
  - title: Home
    url: /
  - title: About
    url: /about
  - title: Contact
    url: /contact
  - title: Feed
    url: /feed.xml
email: srisatyalokesh2.12@gmail.com
# See: https://disqus.com/
disqus_username: disqus_username
# Contact Form Setting
# See: https://formspree.io/
formspree_form_id: formspree_form_id


# Social Media Settings
# Remove the item if you don't need it
github_username: SriSatyaLokesh
instagram_username: srisatyalokesh
linkedin_username: SriSatyaLokesh


# Posts Settings
show_time_bar: true
show_modal_on_exit: false
show_modal_on_finish_post: true
two_columns_layout: true


# Advanced Settings
baseurl: "/learn-ai" # the subpath of your site, e.g. /blog
url: "https://srisatyalokesh.is-a.dev" # the base hostname & protocol for your site
google_analytics: "UA-XXXXXXXX-X"
language: "en"
categories_folder: category
sent_message_url: "/contact/message-sent/"


# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/
future: true
collections:
  authors:
    output: true
paginate_path: "/page/:num/"
show_get_theme_btn: true
use_logo: false

# Content paginator
paginate_content:
  enabled: true
  debug: false
  collections:
    - posts
  auto: false
  separator: "--page-break--"
  permalink: "/:num/"
  seo_canonical: true
  properties:
    part:
      is_generated: true
    last:
      is_generated: true
    single:
      is_generated: true

# SASS
sass:
  style: compressed

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-paginate-content

# Exclude my node related stuff
exclude: [
  'docs/',
  'vendor/',
  'LICENSE',
  'CHANGELOG.md',
  'jekflix.gemspec',
  'package.json',
  'package-lock.json',
  'src',
  'node_modules',
  'initpost.sh',
  'Gemfile',
  'Gemfile.lock',
  'gulpfile.js',
  'README.md'
]

# Theme
version: v1.0.0
